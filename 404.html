<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — CyberResume ATS Pro</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #040d0a;
    color: #c8f0dc;
    font-family: 'IBM Plex Mono', monospace;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    text-align: center;
  }
  .wrap { max-width: 500px; padding: 40px; }
  .code { font-family: 'Syne', sans-serif; font-size: 6rem; font-weight: 800; color: #00ff88; line-height: 1; margin-bottom: 16px; }
  .msg { font-size: 1rem; color: #4a7a5e; margin-bottom: 8px; }
  .sub { font-size: 0.78rem; color: #1e4a32; margin-bottom: 32px; }
  a {
    display: inline-block;
    padding: 12px 28px;
    background: #00ff88;
    color: #040d0a;
    font-weight: 700;
    border-radius: 4px;
    text-decoration: none;
    font-size: 0.85rem;
    transition: opacity 0.2s;
  }
  a:hover { opacity: 0.85; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <div class="msg">// Page not found</div>
    <div class="sub">This path doesn't exist in our security perimeter.</div>
    <a href="/cyber-resume-builder/">↩ Back to Resume Builder</a>
  </div>
